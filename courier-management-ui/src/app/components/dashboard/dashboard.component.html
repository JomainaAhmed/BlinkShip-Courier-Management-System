<app-navbar />

<main class="max-w-7xl mx-auto px-8 pt-40 pb-20">
  <!-- Header -->
  <header class="mb-12 animate-slide-up">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-4xl font-black text-white tracking-tighter uppercase">
        Welcome, <span class="text-primary">{{ user?.username }}</span>
      </h2>
      <div class="flex items-center gap-4">
        <span class="text-[10px] font-bold text-white uppercase tracking-widest">Customer Terminal</span>
        <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
      </div>
    </div>
    <p class="text-white text-[10px] font-bold uppercase tracking-[0.3em]">Operational Dashboard // Session: Active
    </p>
  </header>

  <!-- Quick Actions -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16 animate-slide-up" style="animation-delay: 0.1s">
    <a routerLink="/book"
      class="blink-card p-10 group cursor-pointer hover:border-primary/30 transition-all bg-surface-dim/50">
      <div class="flex justify-between items-start mb-8">
        <div
          class="w-12 h-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center group-hover:bg-primary group-hover:text-black transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 text-white/50 group-hover:text-primary transition-colors" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </div>
      <h3 class="text-2xl font-black text-white tracking-tight uppercase mb-2">Book New Parcel</h3>
      <p class="text-[10px] font-bold text-white uppercase tracking-widest">Create a priority shipment instantly
      </p>
    </a>

    <a routerLink="/track"
      class="blink-card p-10 group cursor-pointer hover:border-primary/30 transition-all bg-surface-dim/50">
      <div class="flex justify-between items-start mb-8">
        <div
          class="w-12 h-12 rounded-2xl bg-primary/10 text-primary flex items-center justify-center group-hover:bg-primary group-hover:text-black transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 text-white/50 group-hover:text-primary transition-colors" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </div>
      <h3 class="text-2xl font-black text-white tracking-tight uppercase mb-2">Track Shipment</h3>
      <p class="text-[10px] font-bold text-white uppercase tracking-widest">Status and Timeline Tracking</p>
    </a>
  </div>

  <!-- Dynamic Stats Bar -->
  <app-shipment-summary [stats]="getStats()"></app-shipment-summary>

  <!-- Shipment Module -->
  <section class="animate-slide-up" style="animation-delay: 0.3s">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
        </div>
        <h3 class="text-2xl font-black text-white tracking-tight uppercase">My <span
            class="text-primary">Shipments</span></h3>
      </div>
    </div>

    <!-- New Paginated List Component -->
    <app-shipment-list [shipments]="shipments" (downloadInvoice)="downloadInvoice($event)" (exportCsv)="exportCsv()"
      (fetchActivities)="fetchActivities($event)"></app-shipment-list>

    <!-- Loading State -->
    <div *ngIf="loading" class="p-20 text-center">
      <div class="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto"></div>
      <p class="text-[10px] font-bold text-white uppercase tracking-[0.4em] mt-6">Synchronizing data...</p>
    </div>
  </section>
</main>
