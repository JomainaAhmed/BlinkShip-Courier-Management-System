<app-navbar />
<div class="min-h-screen pt-32 flex items-center justify-center p-6 bg-background relative overflow-hidden">
  <!-- Ambient Glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[140px] animate-fade-in"></div>

  <div class="w-full max-w-lg animate-slide-up relative z-10">
    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-24 h-24 rounded-[32px] bg-gradient-to-br from-primary to-orange-600 text-black shadow-2xl shadow-primary/30 mb-10 transform -rotate-6">
        <span class="text-3xl font-black italic tracking-tighter">BS</span>
      </div>
      <h1 class="text-5xl font-bold text-white tracking-tighter uppercase leading-none">BLINK<span class="text-primary">SHIP</span></h1>
      <p class="text-[10px] font-bold text-white uppercase tracking-[0.4em] mt-4">Command Your Logistics</p>

    </div>

    <div class="blink-card p-10 md:p-14">
      <h2 class="text-xl font-bold text-white mb-10 tracking-tight text-center uppercase">Login</h2>
      
      <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-8">
        <div class="group">
          <label class="block text-[10px] font-bold text-white uppercase tracking-[0.2em] mb-4 group-focus-within:text-primary transition-colors">Username</label>
          <input 
            type="text" 
            name="username"
            [(ngModel)]="credentials.username"
            #username="ngModel"
            required
            class="premium-input" 
            [class.border-red-500]="username.invalid && username.touched"
            placeholder="ENTER YOUR USERNAME"
          >
          <div *ngIf="username.invalid && username.touched" class="text-red-500 text-[10px] mt-2 uppercase font-bold tracking-widest animate-fade-in">
            Username is required
          </div>
        </div>

        <div class="group relative">
          <label class="block text-[10px] font-bold text-white uppercase tracking-[0.2em] mb-4 group-focus-within:text-primary transition-colors">Password</label>
          <div class="relative">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              name="password"
              [(ngModel)]="credentials.password"
              #password="ngModel"
              required
              class="premium-input pr-16" 
              [class.border-red-500]="password.invalid && password.touched"
              placeholder="ENTER YOUR PASSWORD"
            >
            <button 
              type="button"
              (click)="togglePassword()"
              class="absolute right-6 top-1/2 -translate-y-1/2 text-white hover:text-primary transition-colors"
            >
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
          <div *ngIf="password.invalid && password.touched" class="text-red-500 text-[10px] mt-2 uppercase font-bold tracking-widest animate-fade-in">
            Password is required
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="!loginForm.valid || loading"
          class="btn-primary w-full flex items-center justify-center gap-4 py-5"
        >
          <span *ngIf="loading" class="w-5 h-5 border-4 border-black/20 border-t-black rounded-full animate-spin"></span>
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>
      </form>

      <div class="mt-12 pt-10 border-t border-white text-center">
        <p class="text-white text-[10px] font-bold uppercase tracking-widest">
          New user? 
          <a routerLink="/signup" class="text-primary hover:underline ml-2">Create Account</a>
        </p>
      </div>
    </div>
  </div>
</div>
