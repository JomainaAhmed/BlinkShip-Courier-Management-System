<app-navbar />

<div class="min-h-screen bg-background pt-40 pb-20 px-8">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <header class="mb-12 animate-slide-up">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-4xl font-black text-white tracking-tighter uppercase">
          All <span class="text-primary">Deliveries</span>
        </h2>
        <div class="flex items-center gap-4">
          <span class="text-[10px] font-bold text-white uppercase tracking-widest">Archive</span>
          <div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
        </div>
      </div>
      <p class="text-white text-[10px] font-bold uppercase tracking-[0.3em]">Full shipment history and documentation</p>
    </header>

    <!-- Main Content -->
    <div class="animate-slide-up" style="animation-delay: 0.1s">
      <app-shipment-list 
        [shipments]="shipments"
        (downloadInvoice)="downloadInvoice($event)"
        (exportCsv)="exportCsv()"
        (fetchActivities)="fetchActivities($event)"
      ></app-shipment-list>

      <!-- Loading State -->
      <div *ngIf="loading" class="p-20 text-center">
        <div class="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-[10px] font-bold text-white uppercase tracking-[0.4em] mt-6">Loading archive...</p>
      </div>
    </div>
  </div>
</div>
